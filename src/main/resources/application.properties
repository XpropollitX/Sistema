spring.application.name=Sistema-Biblioteca

# Base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_biblioteca?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=2x0.Propollit.0x4
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto del servidor
server.port=8081

# JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Lima

# Thymeleaf
spring.thymeleaf.cache=false

# JWT
jwt.secret=SistemaBibliotecaJwtClaveSuperSegura2026ParaFirmarTokensConHS256DebeSerLarga
jwt.expiration=86400000

# Errores en desarrollo
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always

# Logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.security=DEBUG